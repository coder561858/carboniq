<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>carboniq — Login / Register</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .auth-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      padding: 2rem;
      margin-top: 60px;
    }

    .auth-container-sliding {
      background-color: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: 0 14px 28px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      width: 768px;
      max-width: 100%;
      min-height: 520px;
      border: 1px solid var(--border-color);
    }

    .form-container {
      position: absolute;
      top: 0;
      height: 100%;
      transition: all 0.6s ease-in-out;
      background-color: var(--bg-card); /* Fixed variable name */
    }

    .sign-in-container {
      left: 0;
      width: 50%;
      z-index: 2;
      opacity: 1;
      visibility: visible;
      transition: all 0.6s ease-in-out;
    }

    .auth-container-sliding.right-panel-active .sign-in-container {
      transform: translateX(100%);
      opacity: 0;
      visibility: hidden;
    }

    .sign-up-container {
      left: 0;
      width: 50%;
      opacity: 0;
      visibility: hidden;
      z-index: 1;
      transition: all 0.6s ease-in-out;
    }

    .auth-container-sliding.right-panel-active .sign-up-container {
      transform: translateX(100%);
      opacity: 1;
      visibility: visible;
      z-index: 5;
      animation: show 0.6s;
    }

    @keyframes show {
      0%, 49.99% {
        opacity: 0;
        z-index: 1;
      }
      50%, 100% {
        opacity: 1;
        z-index: 5;
      }
    }

    .overlay-container {
      position: absolute;
      top: 0;
      left: 50%;
      width: 50%;
      height: 100%;
      overflow: hidden;
      transition: transform 0.6s ease-in-out;
      z-index: 100;
    }

    .auth-container-sliding.right-panel-active .overlay-container {
      transform: translateX(-100%);
    }

    .overlay {
      background: #10b981; /* Green color requested */
      background: linear-gradient(to right, #10b981, #059669);
      background-repeat: no-repeat;
      background-size: cover;
      background-position: 0 0;
      color: #ffffff;
      position: relative;
      left: -100%;
      height: 100%;
      width: 200%;
      transform: translateX(0);
      transition: transform 0.6s ease-in-out;
    }

    .auth-container-sliding.right-panel-active .overlay {
      transform: translateX(50%);
    }

    .overlay-panel {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 0 40px;
      text-align: center;
      top: 0;
      height: 100%;
      width: 50%;
      transform: translateX(0);
      transition: transform 0.6s ease-in-out;
    }

    .overlay-left {
      transform: translateX(-20%);
    }

    .auth-container-sliding.right-panel-active .overlay-left {
      transform: translateX(0);
    }

    .overlay-right {
      right: 0;
      transform: translateX(0);
    }

    .auth-container-sliding.right-panel-active .overlay-right {
      transform: translateX(20%);
    }

    .overlay-panel h1 {
      font-size: 2.2rem;
      margin-bottom: 1rem;
      color: #ffffff;
    }

    .overlay-panel p {
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.5;
      margin-bottom: 2rem;
      color: rgba(255, 255, 255, 0.9);
    }

    .auth-form {
      background-color: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 0 50px;
      height: 100%;
      text-align: center;
    }

    .auth-form h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: var(--text-color);
    }

    .auth-form input {
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 14px 15px;
      margin-bottom: 20px; /* Added spacing between placeholders */
      width: 100%;
      border-radius: var(--radius-md);
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .auth-form input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .auth-form button {
      border-radius: var(--radius-md);
      border: 1px solid #3b82f6; /* Blue button color requested */
      background-color: #3b82f6;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 14px 45px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: transform 80ms ease-in, background-color 0.2s;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    .auth-form button:active {
      transform: scale(0.95);
    }
    
    .auth-form button:hover {
      background-color: #2563eb;
    }

    button.ghost {
      background-color: transparent;
      border-color: #ffffff;
      margin-top: 1rem;
      border-radius: var(--radius-md);
      color: #ffffff;
      font-size: 1rem;
      font-weight: bold;
      padding: 12px 45px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: transform 80ms ease-in, background-color 0.2s, color 0.2s;
      cursor: pointer;
    }

    button.ghost:active {
      transform: scale(0.95);
    }
    
    button.ghost:hover {
      background-color: #ffffff;
      color: #10b981;
    }
    
    .auth-error {
      color: #ef4444;
      font-size: 0.9rem;
      text-align: center;
      display: none;
      margin-bottom: 1rem;
      padding: 0.5rem 1rem;
      background: rgba(239, 68, 68, 0.1);
      border-radius: var(--radius-sm);
      width: 100%;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .auth-wrapper {
        padding: 1rem;
        align-items: flex-start;
        margin-top: 80px;
      }

      /* Stack layout: form on top (60%), overlay on bottom (40%) */
      .auth-container-sliding {
        min-height: 580px;
        width: 100%;
      }

      /* All form containers: full width, top 60% of the card */
      .form-container {
        position: absolute;
        width: 100%;
        height: 60%;
        top: 0;
        left: 0;
        transition: all 0.6s ease-in-out;
      }

      /* Sign-in: visible by default, slides up & fades out when right-panel-active */
      .sign-in-container {
        opacity: 1;
        visibility: visible;
        z-index: 2;
        transform: translateY(0);
      }
      .auth-container-sliding.right-panel-active .sign-in-container {
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10%);
        z-index: 1;
      }

      /* Sign-up: hidden by default, fades in when right-panel-active */
      .sign-up-container {
        opacity: 0;
        visibility: hidden;
        z-index: 1;
        transform: translateY(10%);
      }
      .auth-container-sliding.right-panel-active .sign-up-container {
        opacity: 1;
        visibility: visible;
        z-index: 5;
        transform: translateY(0);
        animation: none;
      }

      /* Overlay sits in the bottom 40% */
      .overlay-container {
        position: absolute;
        left: 0;
        top: 60%;
        width: 100%;
        height: 40%;
        overflow: hidden;
        transition: none;
        transform: none !important;
        z-index: 100;
      }

      /* Overlay itself fills the container, no sliding tricks needed on mobile */
      .overlay {
        width: 100%;
        height: 200%;   /* tall enough for both panels stacked */
        top: 0;
        left: 0;
        transform: translateY(0) !important;
        transition: transform 0.6s ease-in-out;
      }
      .auth-container-sliding.right-panel-active .overlay {
        transform: translateY(-50%) !important;
      }

      /* Each overlay panel is full-width, half the overlay height */
      .overlay-panel {
        position: absolute;
        width: 100%;
        height: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        padding: 0 24px;
        text-align: center;
        transform: none !important;
      }

      /* overlay-left = "Welcome Back" panel — shown first (top of the tall overlay) */
      .overlay-left {
        top: 0;
      }

      /* overlay-right = "Hello, Ecosaver" panel — below */
      .overlay-right {
        top: 50%;
        bottom: auto;
      }

      .overlay-panel h1 {
        font-size: 1.6rem;
        margin-bottom: 0.6rem;
      }
      .overlay-panel p {
        font-size: 0.9rem;
        margin-bottom: 1.2rem;
      }

      .auth-form {
        padding: 1.5rem 24px 1rem;
      }
      .auth-form h1 {
        font-size: 1.6rem;
        margin-bottom: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <nav class="navbar" id="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="navbar-logo">
        <span class="logo-icon">🌱</span>
        <span class="brand-name"><span class="brand-carbon">carbon</span><span class="brand-iq">iq</span></span>
      </a>
      <ul class="navbar-links" id="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" fill="#818cf8" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display: block;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></li>
      </ul>
    </div>
  </nav>

  <div class="auth-wrapper">
    <!-- Make it start with right-panel-active to default to Sign Up view -->
    <div class="auth-container-sliding right-panel-active" id="auth-container">
      
      <!-- Sign Up Form (On the left underneath overlay, revealed when right-panel-active) -->
      <div class="form-container sign-up-container">
        <form class="auth-form" id="signup-form">
          <h1>Create Account</h1>
          <div class="auth-error" id="signup-error"></div>
          <input type="text" id="signup-username" placeholder="Name" required />
          <input type="email" id="signup-email" placeholder="Email Address" required />
          <input type="password" id="signup-password" placeholder="Password" required />
          <button type="submit" id="signup-submit">Sign Up</button>
        </form>
      </div>

      <!-- Sign In Form (On the left initially, hidden when right-panel-active) -->
      <div class="form-container sign-in-container">
        <form class="auth-form" id="login-form">
          <h1>Sign In</h1>
          <div class="auth-error" id="login-error"></div>
          <input type="email" id="login-email" placeholder="Email Address" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button type="submit" id="login-submit">Sign In</button>
        </form>
      </div>

      <!-- Sliding Overlay -->
      <div class="overlay-container">
        <div class="overlay">
          <!-- Left Overlay (Shown when signing up) -->
          <div class="overlay-panel overlay-left">
            <h1>Welcome Back!</h1>
            <p>To keep saving the environment please login with your info</p>
            <button class="ghost" id="signIn">Sign In</button>
          </div>
          <!-- Right Overlay (Shown when signing in) -->
          <div class="overlay-panel overlay-right">
            <h1>Hello, Ecosaver!</h1>
            <p>Enter your personal details and start tracking your carbon footprint</p>
            <button class="ghost" id="signUp">Sign Up</button>
          </div>
        </div>
      </div>
      
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
